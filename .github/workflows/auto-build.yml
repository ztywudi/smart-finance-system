name: 自动打包Windows EXE

# 触发条件：当创建新的Release时自动运行
on:
  release:
    types: [created]

# 权限设置
permissions:
  contents: write
  packages: write

jobs:
  build-windows-exe:
    name: 打包Windows EXE
    runs-on: windows-latest
    
    steps:
    # 步骤1：检出代码
    - name: 检出代码
      uses: actions/checkout@v4
    
    # 步骤2：设置Python环境
    - name: 设置Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    # 步骤3：安装依赖
    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 openpyxl pyinstaller
      shell: pwsh
    
    # 步骤4：直接运行PyInstaller打包（更简单的方法）
    - name: 打包EXE
      run: |
        cd finance
        pyinstaller --onefile --windowed --name "智能财务系统" main.py
      shell: pwsh
    
    # 步骤5：验证EXE文件是否存在
    - name: 验证EXE文件
      run: |
        $exePath = "finance/dist/智能财务系统.exe"
        if (Test-Path $exePath) {
          Write-Host "✅ EXE文件生成成功！"
          Get-Item $exePath | Select-Object Name, Length
        } else {
          Write-Host "❌ EXE文件未生成"
          exit 1
        }
      shell: pwsh
    
    # 步骤6：上传EXE到Release
    - name: 上传EXE到Release
      uses: softprops/action-gh-release@v2
      with:
        files: finance/dist/智能财务系统.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # 步骤7：打印下载链接
    - name: 打印下载信息
      run: |
        Write-Host "======================================"
        Write-Host "✅ EXE文件已自动上传到Release！"
        Write-Host "下载地址: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}"
        Write-Host "======================================"
      shell: pwsh
