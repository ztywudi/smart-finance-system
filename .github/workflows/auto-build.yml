name: 自动打包Windows EXE

# 触发条件：当创建新的Release时自动运行
on:
  release:
    types: [created]

# 权限设置
permissions:
  contents: write
  packages: write

jobs:
  build-windows-exe:
    name: 打包Windows EXE
    runs-on: windows-latest
    
    steps:
    # 步骤1：检出代码
    - name: 检出代码
      uses: actions/checkout@v4
    
    # 步骤2：设置Python环境
    - name: 设置Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    # 步骤3：安装依赖
    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 openpyxl pyinstaller
      shell: pwsh
    
    # 步骤4：直接运行PyInstaller打包
    - name: 打包EXE
      run: |
        cd finance
        pyinstaller --onefile --windowed --name "智能财务系统" main.py
      shell: pwsh
    
    # 步骤5：验证EXE文件是否存在
    - name: 验证EXE文件
      run: |
        $exePath = "finance/dist/智能财务系统.exe"
        if (Test-Path $exePath) {
          Write-Host "EXE file created successfully!"
          Get-Item $exePath | Select-Object Name, Length
        } else {
          Write-Host "EXE file NOT found"
          exit 1
        }
      shell: pwsh
    
    # 步骤6：上传EXE到Release
    - name: 上传EXE到Release
      uses: softprops/action-gh-release@v2
      with:
        files: finance/dist/智能财务系统.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # 步骤7：打印下载链接
    - name: 打印下载信息
      run: |
        Write-Host "======================================"
        Write-Host "EXE file uploaded to Release!"
        Write-Host "Download: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}"
        Write-Host "======================================"
      shell: pwsh

  build-macos-app:
    name: 打包macOS APP
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 openpyxl pyinstaller
    
    - name: 打包macOS应用
      run: |
        cd finance
        pyinstaller --windowed --name "智能财务系统" main.py
    
    - name: 创建DMG安装包
      run: |
        cd finance/dist
        hdiutil create -volname "智能财务系统" -srcfolder "智能财务系统.app" -ov -format UDZO "智能财务系统.dmg"
    
    - name: 上传DMG到Release
      uses: softprops/action-gh-release@v2
      with:
        files: finance/dist/智能财务系统.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-appimage:
    name: 打包Linux AppImage
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 openpyxl pyinstaller
        sudo apt-get update
        sudo apt-get install -y fuse libfuse2
    
    - name: 打包Linux可执行文件
      run: |
        cd finance
        pyinstaller --onefile --name "智能财务系统" main.py
    
    - name: 上传到Release
      uses: softprops/action-gh-release@v2
      with:
        files: finance/dist/智能财务系统
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
